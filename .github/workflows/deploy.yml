name: Deploy to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=. --message "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Verify live URL
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ob-autodeploy.netlify.app)
          echo "Live URL status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: site returned $STATUS"
          else
            echo "Site is live!"
          fi
